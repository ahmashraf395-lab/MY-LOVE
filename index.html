<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة لنونو ❤️</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #fff0f3; 
            background-image: radial-gradient(#ffccd5 20%, transparent 20%), radial-gradient(#ffccd5 20%, transparent 20%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            text-align: center; 
            margin: 0; 
            padding: 20px; 
            color: #4a0e17; 
        }
        .box { 
            background: rgba(255, 255, 255, 0.95); 
            max-width: 450px; 
            margin: 30px auto; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.2); 
            border: 3px solid #ffb3c1;
            position: relative;
        }
        /* إضافة زهور ديكور حول الصندوق */
        .box::before { content: "🌸"; position: absolute; top: -15px; left: -15px; font-size: 30px; }
        .box::after { content: "🌹"; position: absolute; bottom: -15px; right: -15px; font-size: 30px; }
        
        h1 { color: #ff4d6d; font-size: 26px; margin-bottom: 20px; }
        .rose-title { font-size: 28px; color: #ff4d6d; font-weight: bold; }
        
        input[type="password"] { 
            width: 80%; 
            padding: 12px; 
            margin: 15px 0; 
            border: 2px solid #ffb3c1; 
            border-radius: 10px; 
            text-align: center; 
            font-size: 18px; 
            outline: none;
        }
        input[type="password"]:focus { border-color: #ff4d6d; box-shadow: 0 0 5px rgba(255, 77, 109, 0.5); }
        
        button { 
            background-color: #ff4d6d; 
            color: white; 
            border: none; 
            padding: 12px 35px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 18px; 
            font-weight: bold; 
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
        }
        button:hover { background-color: #c71585; transform: scale(1.05); }
        #content { display: none; }
        
        /* استايل ألبوم الصور */
        .photo-album { margin: 20px 0; }
        .photo-album img { width: 100%; max-width: 350px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.15); border: 2px solid #fff; }
        
        .message { font-size: 20px; line-height: 1.8; margin-top: 20px; white-space: pre-line; font-weight: 500; border-top: 2px dashed #ffb3c1; padding-top: 15px; }
    </style>
</head>
<body>

    <!-- صفحة الباسوورد بالورد والتعديلات الجديدة -->
    <div id="login-box" class="box">
        <div class="rose-title">🌹 بموت فيكي ي نونو 🌹</div>
        <p style="font-size: 18px; margin-top: 15px;">اكتبي الباسورد:</p>
        <input type="password" id="password" placeholder="اكتبي الباسوورد هنا...">
        <br>
        <button onclick="checkPassword()">NEXT ❤️</button>
        <p id="error" style="color: red; display: none; margin-top: 15px; font-weight: bold;">الباسوورد غلط يا ملكتي! فكري تاني 😉🌸</p>
    </div>

    <!-- صفحة المصالحة المليانة صور وأغاني -->
    <div id="content" class="box">
        <h1>أنا آسف يا هنوءة ومقدرش على زعلك! 🌹</h1>
        
        <!-- تشغيل الأغنية المرفوعة -->
        <audio id="bg-music" src="11.Mahma_T2olo (1).mp3" controls loop style="margin-top: 20px; width: 100%;"></audio>

        <!-- ألبوم الصور بتاعكم كاملاً -->
        <div class="photo-album">
            <img src="IMG-20251101-WA0022.jpg" alt="صورتنا 1">
            <img src="IMG-20251101-WA0037.jpg" alt="صورتنا 2">
            <img src="IMG-20251101-WA0048.jpg" alt="صورتنا 3">
            <img src="IMG-20251101-WA0072.jpg" alt="صورتنا 4">
            <img src="IMG-20251101-WA0077.jpg" alt="صورتنا 5">
            <img src="IMG-20251101-WA0086.jpg" alt="صورتنا 6">
            <img src="IMG-20251101-WA0092.jpg" alt="صورتنا 7">
            <img src="IMG-20251101-WA0093.jpg" alt="صورتنا 8">
            <img src="IMG-20251101-WA0094.jpg" alt="صورتنا 9">
            <img src="IMG-20251101-WA0101.jpg" alt="صورتنا 10">
        </div>

        <!-- رسالتك الشخصية -->
        <div class="message">
             بحبك وبموت فيكي وبعشق امك انا عارف اني زعلتك بس نا مقدرش ع زعلك ونا مليش غيرك وبحبك ف حقك عليا متزعليش♥️♥️💋
        </div>
    </div>

    <script>
        function checkPassword() {
            var pass = document.getElementById("password").value;
            if(pass === "3320") {
                document.getElementById("login-box").style.display = "none";
                document.getElementById("content").style.display = "block";
                document.getElementById("bg-music").play();
            } else {
                document.getElementById("error").style.display = "block";
            }
        }
    </script>
</body>
</html>
