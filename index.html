<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بموت فيكي </title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ffe6e6; text-align: center; margin: 0; padding: 20px; color: #4a0e17; }
        .box { background: white; max-width: 450px; margin: 50px auto; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        h1 { color: #ff4d6d; font-size: 24px; }
        input[type="password"] { width: 80%; padding: 12px; margin: 15px 0; border: 2px solid #ffb3c1; border-radius: 10px; text-align: center; font-size: 18px; }
        button { background-color: #ff4d6d; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; }
        button:hover { background-color: #c71585; }
        #content { display: none; }
        .heart { font-size: 60px; color: #ff4d6d; animation: beat .25s infinite alternate; margin: 20px 0; }
        @keyframes beat { to { transform: scale(1.1); } }
        .message { font-size: 20px; line-height: 1.8; margin-top: 20px; white-space: pre-line; font-weight: 500; }
    </style>
</head>
<body>

    <!-- صفحة الباسوورد -->
    <div id="login-box" class="box">
        <h1>🔒 منطقة خاصة جداً لست البنات</h1>
        <p style="font-size: 16px;">اكتبي الكلمة السرية عشان تشوفي المفاجأة:</p>
        <input type="password" id="password" placeholder="اكتبي الباسوورد هنا...">
        <br>
        <button onclick="checkPassword()">دخول ورضا ❤️</button>
        <p id="error" style="color: red; display: none; margin-top: 15px; font-weight: bold;">الباسوورد غلط يا ملكتي! فكري تاني 😉</p>
    </div>

    <!-- صفحة المصالحة -->
    <div id="content" class="box">
        <h1>أنا آسف انا مقدرش على زعلك! 🌹</h1>
        
        <!-- تشغيل الأغنية المرفوعة -->
        <audio id="bg-music" src="11.Mahma_T2olo (1).mp3" controls loop style="margin-top: 20px; width: 100%;"></audio>

        <div class="heart">❤️</div>

        <!-- رسالتك الشخصية -->
        <div class="message">
            انا عارف اني زعلتك بس نا مقدرش ع زعلك ونا مليش غيرك وبحبك ف حقك عليا متزعليش♥️♥️💋
        </div>
    </div>

    <script>
        function checkPassword() {
            var pass = document.getElementById("password").value;
            if(pass === "3320") {
                document.getElementById("login-box").style.display = "none";
                document.getElementById("content").style.display = "block";
                document.getElementById("bg-music").play();
            } else {
                document.getElementById("error").style.display = "block";
            }
        }
    </script>
</body>
</html>
